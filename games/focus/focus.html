<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Game AI</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    text-align: center;
}

/* TOP BAR */
#topBar {
    position: absolute;
    top: 0.625rem;
    left: 0.625rem;
    display: flex;
    gap: 0.625rem;
}

button {
    padding: 0.625rem 1.125rem;
    font-size: 0.875rem;
    font-weight: bold;
    border: none;
    border-radius: 0.75rem;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 0.25rem 0.625rem rgba(0,0,0,0.3);
}

button:hover {
    transform: scale(1.08);
}

button:nth-child(1) { background: #00c853; color: white; }
button:nth-child(2) { background: #ffab00; color: black; }
button:nth-child(3) { background: #d50000; color: white; }

/* TITLE */
h1 {
    margin: 0.625rem;
    font-size: 1.375rem;
}

/* INFO */
.info {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    font-size: 0.8125rem;
    margin: 0.375rem;
    opacity: 0.9;
}

/* GAME AREA */
#gameArea {
    width: 65%;
    height: 55vh;
    margin: auto;
    position: relative;
    overflow: hidden;
    border: 2px solid white;
    border-radius: 0.875rem;
    background: rgba(255,255,255,0.05);
}

/* BALL */
.ball {
    width: 2.5rem;
    height: 2.5rem;
    border-radius: 50%;
    position: absolute;
    cursor: pointer;
}

.green { background: limegreen; }
.red { background: red; }
.yellow { background: gold; }

/* GAME OVER SCREEN */
#gameOver {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85);
    padding: 1.5625rem;
    border-radius: 0.9375rem;
    text-align: center;
    width: 13.75rem;
}

#gameOver button {
    margin-top: 0.625rem;
    background: #00c853;
    color: white;
}

/* RESPONSIVE DESIGN */
@media (max-width: 37.5rem) {
    #topBar {
        top: 0.3125rem;
        left: 0.3125rem;
        gap: 0.3125rem;
    }
    button {
        padding: 0.5rem 0.75rem;
        font-size: 0.75rem;
    }
    h1 {
        font-size: 1.125rem;
        margin: 0.3125rem;
    }
    .info {
        gap: 0.5rem;
        font-size: 0.75rem;
        margin: 0.25rem;
    }
    #gameArea {
        width: 90%;
        height: 50vh;
    }
    .ball {
        width: 1.875rem;
        height: 1.875rem;
    }
    #gameOver {
        width: 11.25rem;
        padding: 0.9375rem;
    }
}

</style>
</head>

<body>

<!-- Buttons -->
<div id="topBar">
    <button onclick="startGame()">Start</button>
    <button onclick="restartGame()">Restart</button>
    <button onclick="goBack()">Back</button>
</div>

<h1>🎯 Focus Game (AI Powered)</h1>

<!-- Info -->
<div class="info">
    <div>Score: <span id="score">0</span></div>
    <div>Lives: <span id="lives">3</span></div>
    <div>Time: <span id="time">60</span></div>
    <div>High: <span id="highScore">0</span></div>
    <div>AI: <span id="aiLevel">Beginner</span></div>
</div>

<!-- Game Area -->
<div id="gameArea">

    <!-- GAME OVER UI -->
    <div id="gameOver">
        <h2>⏱ Game Over</h2>
        <p>Score: <span id="finalScore"></span></p>
        <button onclick="restartGame()">Restart</button>
    </div>

</div>

<script>

let score = 0;
let lives = 3;
let time = 60;

let gameInterval;
let spawnInterval;

/* HIGH SCORE */
let highScore = localStorage.getItem("highScore") || 0;
document.getElementById("highScore").innerText = highScore;

/* 🧠 AI SYSTEM */
let AI = {
    correct: 0,
    wrong: 0,
    level: "Beginner"
};

function updateAI(isCorrect) {
    if (isCorrect) AI.correct++;
    else AI.wrong++;

    let total = AI.correct + AI.wrong;
    let accuracy = (AI.correct / total) * 100;

    if (accuracy > 80) AI.level = "Advanced";
    else if (accuracy > 50) AI.level = "Intermediate";
    else AI.level = "Beginner";

    updateDifficulty();
}

/* AI DIFFICULTY */
function updateDifficulty() {
    clearInterval(spawnInterval);

    let speed;

    if (AI.level === "Beginner") speed = 700;
    else if (AI.level === "Intermediate") speed = 450;
    else speed = 250;

    spawnInterval = setInterval(spawnBall, speed);
}

/* BACK */
function goBack() {
    window.history.back();
}

/* START GAME */
function startGame() {
    resetGame();

    gameInterval = setInterval(() => {
        time--;
        document.getElementById("time").innerText = time;

        if (time <= 0 || lives <= 0) {
            endGame();
        }
    }, 1000);

    updateDifficulty();
}

/* RESTART */
function restartGame() {
    document.getElementById("gameOver").style.display = "none";
    clearInterval(gameInterval);
    clearInterval(spawnInterval);
    startGame();
}

/* RESET */
function resetGame() {
    score = 0;
    lives = 3;
    time = 60;

    AI.correct = 0;
    AI.wrong = 0;
    AI.level = "Beginner";

    document.getElementById("score").innerText = score;
    document.getElementById("lives").innerText = lives;
    document.getElementById("time").innerText = time;
    document.getElementById("aiLevel").innerText = AI.level;

    document.getElementById("gameArea").innerHTML = `
        <div id="gameOver">
            <h2>⏱ Game Over</h2>
            <p>Score: <span id="finalScore"></span></p>
            <button onclick="restartGame()">Restart</button>
        </div>
    `;
}

/* SPAWN BALL */
function spawnBall() {
    const ball = document.createElement("div");
    ball.classList.add("ball");

    let colors = ["green", "red", "yellow"];
    let color = colors[Math.floor(Math.random() * colors.length)];
    ball.classList.add(color);

    ball.style.top = Math.random() * 85 + "%";
    ball.style.left = Math.random() * 85 + "%";

    ball.onclick = function () {

        let isCorrect = false;

        if (color === "green") {
            score++;
            isCorrect = true;
            document.getElementById("score").innerText = score;
        } else {
            lives--;
            isCorrect = false;
            document.getElementById("lives").innerText = lives;
        }

        updateAI(isCorrect);

        ball.remove();

        if (lives <= 0) endGame();
    };

    document.getElementById("gameArea").appendChild(ball);

    setTimeout(() => ball.remove(), 1500);
}

/* END GAME (NO POPUP) */
function endGame() {
    clearInterval(gameInterval);
    clearInterval(spawnInterval);

    if (score > highScore) {
        highScore = score;
        localStorage.setItem("highScore", highScore);
        document.getElementById("highScore").innerText = highScore;
    }

    document.getElementById("finalScore").innerText = score;
    document.getElementById("gameOver").style.display = "block";
}

/* AI DISPLAY */
setInterval(() => {
    document.getElementById("aiLevel").innerText = AI.level;
}, 500);

</script>

</body>
</html>
