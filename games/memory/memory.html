<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memory Game Pro++</title>

<style>
body {
    margin: 0;
    font-family: "Arial Rounded MT Bold", Arial;
    background: linear-gradient(135deg, #ff4d6d, #ff8fab, #7b2cbf);
    color: white;
    text-align: center;
}

#backBtn {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 10px 14px;
    border: none;
    border-radius: 10px;
    background: white;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

/* START SCREEN */
#startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #ff4d6d, #7b2cbf);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

/* info */
#info {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 10px;
    font-size: 18px;
}

/* message */
#msg {
    margin-top: 10px;
    font-size: 16px;
}

/* grid */
.grid {
    margin: 20px auto;
    display: grid;
    gap: 10px;
    justify-content: center;
}

/* card */
.card {
    width: 60px;
    height: 60px;
    background: rgba(255,255,255,0.25);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 26px;
    border-radius: 12px;
    cursor: pointer;
}

.flipped {
    background: white;
    color: black;
}

/* buttons */
button {
    padding: 10px 16px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    z-index: 1001; /* above all */
}

#nextBtn {
    display: none;
    background: #00ff85;
}

#restart {
    background: white;
}

</style>
</head>

<body>

<button id="backBtn" onclick="window.history.back()">⬅ Back</button>

<!-- ✅ START SCREEN -->
<div id="startScreen">
    <h1>🧠 Memory Game Pro++</h1>
    <p>Click Start to begin the challenge 🚀</p>

    <button onclick="startGame()" style="
        padding: 15px 25px;
        font-size: 18px;
        border-radius: 12px;
        border: none;
        background: #00ff85;
        cursor: pointer;
        font-weight: bold;
    ">
        ▶ Start Game
    </button>
</div>

<h1>🧠 Memory Game Pro++</h1>

<div id="info">
    <div>Level: <span id="level">1</span></div>
    <div>⏱ Time: <span id="time">60</span></div>
    <div>Score: <span id="score">0</span></div>
</div>

<div id="msg"></div>

<div class="grid" id="grid"></div>

<button id="nextBtn" onclick="nextLevel()">Next Level ▶</button>
<button id="restart" onclick="restartGame()">Restart</button>

<script>

let level = 1;
let score = 0;
let time = 60;
let timer;

let first = null;
let second = null;
let lock = false;

let gameStarted = false;

const symbolsBase = ["🍎","🍌","🍇","🍓","🍍","🥝","🍒","🍉"];

/* START GAME */
function startGame() {
    document.getElementById("startScreen").style.display = "none";

    gameStarted = true;

    level = 1;
    score = 0;
    time = 60;

    document.getElementById("level").innerText = level;
    document.getElementById("score").innerText = score;
    document.getElementById("time").innerText = time;

    startTimer();
    createBoard();
}

/* TIMER */
function getTime(lvl) {
    if (lvl === 1) return 60;
    if (lvl === 2) return 50;
    if (lvl === 3) return 40;
    if (lvl === 4) return 30;
    return 25;
}

function startTimer() {
    clearInterval(timer);

    timer = setInterval(() => {
        time--;
        document.getElementById("time").innerText = time;

        if (time <= 0) {
            clearInterval(timer);
            lock = true;
            document.getElementById("msg").innerText = "⏱ Time Over!";
        }
    }, 1000);
}

/* BOARD */
function createBoard() {
    let grid = document.getElementById("grid");
    grid.innerHTML = "";

    let pairs = level + 2;
    let symbols = symbolsBase.slice(0, pairs);
    let cards = [...symbols, ...symbols];

    grid.style.gridTemplateColumns = `repeat(${Math.min(pairs, 6)}, 60px)`;

    shuffle(cards).forEach(symbol => {
        let div = document.createElement("div");
        div.classList.add("card");
        div.dataset.value = symbol;
        div.innerText = "❓";

        div.onclick = () => flip(div);

        grid.appendChild(div);
    });

    document.getElementById("nextBtn").style.display = "none";
}

/* shuffle */
function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

/* flip */
function flip(card) {
    if (lock || card.classList.contains("flipped")) return;

    card.innerText = card.dataset.value;
    card.classList.add("flipped");

    if (!first) {
        first = card;
    } else {
        second = card;
        lock = true;
        check();
    }
}

/* check */
function check() {
    if (first.dataset.value === second.dataset.value) {
        score += 10;
        document.getElementById("score").innerText = score;

        first = null;
        second = null;
        lock = false;

        checkWin();
    } else {
        setTimeout(() => {
            first.innerText = "❓";
            second.innerText = "❓";

            first.classList.remove("flipped");
            second.classList.remove("flipped");

            first = null;
            second = null;
            lock = false;
        }, 500);
    }
}

/* win */
function checkWin() {
    let flipped = document.querySelectorAll(".flipped").length;
    let total = document.querySelectorAll(".card").length;

    if (flipped === total) {
        clearInterval(timer);
        lock = true;

        document.getElementById("msg").innerText = "🎉 Level Completed!";
        document.getElementById("nextBtn").style.display = "inline-block";
    }
}

/* next */
function nextLevel() {
    level++;
    document.getElementById("level").innerText = level;

    time = getTime(level);
    document.getElementById("time").innerText = time;

    lock = false;
    first = null;
    second = null;

    startTimer();
    createBoard();
}

/* restart */
function restartGame() {
    level = 1;
    score = 0;
    time = getTime(level);

    document.getElementById("level").innerText = level;
    document.getElementById("score").innerText = score;
    document.getElementById("time").innerText = time;
    document.getElementById("msg").innerText = "";

    lock = false;
    first = null;
    second = null;

    startTimer();
    createBoard();
}

</script>

</body>
</html>
