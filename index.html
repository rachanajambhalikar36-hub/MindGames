<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Game Hub AI</title>

<style>
body {
    margin: 0;
    font-family: "Arial Rounded MT Bold", Arial, sans-serif;

    background: linear-gradient(135deg, #ff4d6d, #ff8fab, #7b2cbf, #4cc9f0);
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 1.5rem;
}

header h1 {
    font-size: 2.5rem;
    margin: 0;
    text-shadow: 0 0.1875rem 0.625rem rgba(0,0,0,0.3);
}

header p {
    opacity: 0.9;
    font-size: 1rem;
}

/* AI STATUS */
#aiBox {
    margin-top: 0.75rem;
    font-size: 1rem;
    font-weight: bold;
}

/* CONTAINER */
.container {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1.25rem;
    width: 90%;
    max-width: 46.875rem;
    margin: auto;
    padding-bottom: 3.75rem;
}

/* GAME CARD */
.card {
    background: rgba(255,255,255,0.18);
    border-radius: 1.5625rem;
    padding: 1.5625rem;

    display: flex;
    justify-content: space-between;
    align-items: center;

    cursor: pointer;
    transition: 0.2s;

    border: 2px solid rgba(255,255,255,0.3);
    box-shadow: 0 0.5rem 1.25rem rgba(0,0,0,0.25);
}

.card:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.28);
}

/* TEXT */
.title {
    font-size: 1.5rem;
    font-weight: bold;
}

.sub {
    font-size: 0.8125rem;
    opacity: 0.9;
    margin-top: 0.25rem;
}

/* PLAY BUTTON */
.play {
    padding: 0.625rem 1.375rem;
    border: none;
    border-radius: 0.9375rem;
    background: #fff;
    color: #ff2e63;
    font-weight: bold;
    cursor: pointer;
    font-size: 0.875rem;
}

.play:hover {
    transform: scale(1.1);
    background: #ffe5ec;
}

/* RESPONSIVE DESIGN */
@media (max-width: 37.5rem) {
    header {
        padding: 0.9375rem;
    }
    header h1 {
        font-size: 1.75rem;
    }
    header p {
        font-size: 0.875rem;
    }
    #aiBox {
        font-size: 0.875rem;
    }
    .container {
        width: 95%;
        padding-bottom: 2.5rem;
    }
    .card {
        padding: 0.9375rem;
        flex-direction: column;
        text-align: center;
    }
    .title {
        font-size: 1.25rem;
    }
    .sub {
        font-size: 0.75rem;
    }
    .play {
        margin-top: 0.625rem;
        padding: 0.5rem 1.125rem;
        font-size: 0.8125rem;
    }
}

</style>
</head>

<body>

<header>
    <h1>🎮 Kids Game World AI</h1>
    <p>Play & Learn with Smart AI Games</p>

    <!-- 🧠 AI STATUS -->
    <div id="aiBox">
        🧠 AI Level: <span id="aiLevel">Loading...</span> |
        😊 Emotion: <span id="aiEmotion">Loading...</span>
    </div>
</header>

<div class="container">

    <div class="card" onclick="openGame('games/focus/focus.html')">
        <div>
            <div class="title">🎯 Focus Game</div>
            <div class="sub">Click only green balls</div>
        </div>
        <button class="play">Play</button>
    </div>

    <div class="card" onclick="openGame('games/emotion/emotion.html')">
        <div>
            <div class="title">🧠 Emotion Matcher</div>
            <div class="sub">Guess correct emotion</div>
        </div>
        <button class="play">Play</button>
    </div>

    <div class="card" onclick="openGame('games/math/math.html')">
        <div>
            <div class="title">⚡ Math Challenge</div>
            <div class="sub">Solve fast math questions</div>
        </div>
        <button class="play">Play</button>
    </div>

    <div class="card" onclick="openGame('games/memory/memory.html')">
        <div>
            <div class="title">🧩 Memory Game</div>
            <div class="sub">Match the pairs!</div>
        </div>
        <button class="play">Play</button>
    </div>

    <div class="card" onclick="openGame('games/breath/breath.html')">
        <div>
            <div class="title">🌬️ Breathing Game</div>
            <div class="sub">Relax with breathing</div>
        </div>
        <button class="play">Play</button>

</div>

<script>

/* OPEN GAME */
function openGame(path) {
    window.location.href = path;
}

const backendHost = window.location.hostname || "127.0.0.1";
const backendBaseUrl = `http://${backendHost}:5000`;

/* 🧠 ML BACKEND CALL */
function getAILevel() {
    fetch(`${backendBaseUrl}/predict-level`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            score: 10,
            time: 30,
            accuracy: 70
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("aiLevel").innerText = data.level;
    })
    .catch(() => {
        document.getElementById("aiLevel").innerText = "Offline";
    });
}

/* 🗣️ NLP BACKEND CALL */
function getEmotion() {
    fetch(`${backendBaseUrl}/emotion`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            text: "I am happy to play games"
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("aiEmotion").innerText = data.emotion;
    })
    .catch(() => {
        document.getElementById("aiEmotion").innerText = "Offline";
    });
}

/* AUTO LOAD AI */
getAILevel();
getEmotion();

</script>

</body>
</html>
